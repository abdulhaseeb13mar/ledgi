<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Kamel Hisaab</title>
    <style>
      #boot-loader {
        position: fixed;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 0.75rem;
        background: #f9fafb;
        z-index: 9999;
        transition: opacity 0.2s ease;
      }

      #boot-loader.is-hidden {
        opacity: 0;
        pointer-events: none;
      }

      .boot-spinner {
        width: 2rem;
        height: 2rem;
        border-radius: 9999px;
        border: 3px solid #5f59f7;
        border-top-color: transparent;
        animation: boot-spin 0.7s linear infinite;
      }

      .boot-logo {
        width: 50vw;
        height: auto;
        margin-bottom: 0.5rem;
      }

      @keyframes boot-spin {
        to {
          transform: rotate(360deg);
        }
      }
    </style>
  </head>
  <body>
    <div id="boot-loader" aria-live="polite" aria-label="Loading application">
      <img src="/kamel-hisaab-primary.svg" alt="Kamel Hisaab Logo" class="boot-logo" />
      <div class="boot-spinner" aria-hidden="true"></div>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
